server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = / {
    return 302 /es/;
  }

  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
