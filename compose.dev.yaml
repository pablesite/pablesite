services:
  pablesite-dev:
    build:
      context: .
      target: dev
    container_name: pablesite-dev
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 4321
    ports:
      - "4321:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - pablesite_node_modules:/app/node_modules
      - pablesite_astro:/app/.astro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:4321/es/ >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3

volumes:
  pablesite_node_modules:
  pablesite_astro:
