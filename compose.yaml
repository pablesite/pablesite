services:
  pablesite:
    build:
      context: .
    image: ${PABLESITE_IMAGE:-pablesite:latest}
    container_name: pablesite
    restart: unless-stopped
    networks:
      - traefik
    labels:
      traefik.enable: "true"
      traefik.http.routers.pablesite.rule: "Host(`${PABLESITE_HOST:-pablesite.es}`)"
      traefik.http.routers.pablesite.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.pablesite.tls: "true"
      traefik.http.services.pablesite.loadbalancer.server.port: "8080"

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
