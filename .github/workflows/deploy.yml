name: Build, Publish and Deploy

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pablesite
  IMAGE_TAG: sha-${{ github.sha }}
  PRODUCTION_URL: ${{ vars.PRODUCTION_URL != '' && vars.PRODUCTION_URL || 'https://pablesite.es' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PUSH_USERNAME != '' && secrets.GHCR_PUSH_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN != '' && secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.ENABLE_PRODUCTION_DEPLOY == '1'
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.ARDA_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.ARDA_SSH_USER }}
          DEPLOY_KEY: ${{ secrets.ARDA_SSH_PRIVATE_KEY }}
          DEPLOY_PORT: ${{ vars.ARDA_SSH_PORT != '' && vars.ARDA_SSH_PORT || '2621' }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_KEY"
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose
        env:
          DEPLOY_HOST: ${{ secrets.ARDA_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.ARDA_SSH_USER }}
          DEPLOY_PORT: ${{ vars.ARDA_SSH_PORT != '' && vars.ARDA_SSH_PORT || '2621' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH != '' && vars.DEPLOY_PATH || '/datos/docker/compose/pablesite' }}
        run: |
          ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -P "$DEPLOY_PORT" compose.yaml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/compose.yaml"

      - name: Upload release image pin
        env:
          DEPLOY_HOST: ${{ secrets.ARDA_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.ARDA_SSH_USER }}
          DEPLOY_PORT: ${{ vars.ARDA_SSH_PORT != '' && vars.ARDA_SSH_PORT || '2621' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH != '' && vars.DEPLOY_PATH || '/datos/docker/compose/pablesite' }}
        run: |
          cat > .env.release <<EOF
          PABLESITE_IMAGE=${IMAGE_NAME}:${IMAGE_TAG}
          EOF
          scp -P "$DEPLOY_PORT" .env.release "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/.env.release"

      - name: Deploy stack
        env:
          DEPLOY_HOST: ${{ secrets.ARDA_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.ARDA_SSH_USER }}
          DEPLOY_PORT: ${{ vars.ARDA_SSH_PORT != '' && vars.ARDA_SSH_PORT || '2621' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH != '' && vars.DEPLOY_PATH || '/datos/docker/compose/pablesite' }}
          DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE != '' && vars.DEPLOY_ENV_FILE || '.env' }}
          GHCR_USERNAME: ${{ secrets.GHCR_PUSH_USERNAME != '' && secrets.GHCR_PUSH_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PUSH_TOKEN != '' && secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin
            docker compose --env-file '${DEPLOY_ENV_FILE}' --env-file .env.release -f compose.yaml pull
            docker compose --env-file '${DEPLOY_ENV_FILE}' --env-file .env.release -f compose.yaml up -d --remove-orphans
            docker compose --env-file '${DEPLOY_ENV_FILE}' --env-file .env.release -f compose.yaml ps
          "

  smoke-production:
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && vars.ENABLE_PRODUCTION_DEPLOY == '1'
    runs-on: ubuntu-latest
    steps:
      - name: Smoke checks
        run: |
          curl --fail --silent --show-error --location \
            --retry 6 --retry-delay 10 --retry-all-errors \
            "${PRODUCTION_URL}/es/" > /dev/null
